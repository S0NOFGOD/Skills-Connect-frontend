<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Client Login/Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

body {
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  padding:20px;
}

.container{
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

h1{text-align:center;font-weight:700;margin-bottom:10px;}
p{text-align:center;font-size:14px;opacity:0.85;margin-bottom:25px;}

input,button{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
  background:rgba(255,255,255,0.15);
  color:#fff;
}

button{
  background:linear-gradient(135deg,#ffa500,#ff6600);
  font-weight:600;
  cursor:pointer;
  transition:0.3s ease;
}
button:hover{transform:scale(1.03);}

.tabs{display:flex;justify-content:space-around;margin-bottom:20px;}
.tab{padding:10px 20px;cursor:pointer;border-radius:12px;transition:0.3s ease;}
.tab.active{background:linear-gradient(135deg,#ffa500,#ff6600);font-weight:700;}

.form-section{display:none;flex-direction:column;}
.form-section.active{display:flex;}

.error{color:#ff4b5c;font-size:12px;margin-bottom:10px;}

.password-wrapper{position:relative;width:100%;}
.password-wrapper input{padding-right:40px;}
.password-wrapper .toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:#fff;
  opacity:0.7;
  user-select:none;
}
.password-wrapper .toggle-password:hover{opacity:1;}
</style>
</head>
<body>

<div class="container">
  <h1>SkillConnect Client</h1>
  <p>Sign up or log in to find freelancers nearby</p>

  <div class="tabs">
    <div class="tab active" id="login-tab">Login</div>
    <div class="tab" id="signup-tab">Signup</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="form-section active" id="login">
    <div class="error" id="login-error"></div>
    <input type="email" id="login-email" placeholder="Email" required />
    <div class="password-wrapper">
      <input type="password" id="login-password" placeholder="Password" required />
      <span class="toggle-password" data-target="login-password">👁️</span>
    </div>
    <button id="login-btn">Login</button>
    <button id="forgot-btn" style="background:linear-gradient(135deg,#ff6a00,#ee0979);margin-top:5px;">Forgot Password?</button>
  </div>

  <!-- SIGNUP FORM -->
  <div class="form-section" id="signup">
    <div class="error" id="signup-error"></div>
    <input type="text" id="signup-name" placeholder="Full Name" required />
    <input type="email" id="signup-email" placeholder="Email" required />
    <div class="password-wrapper">
      <input type="password" id="signup-password" placeholder="Password" required />
      <span class="toggle-password" data-target="signup-password">👁️</span>
    </div>
    <div class="password-wrapper">
      <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required />
      <span class="toggle-password" data-target="signup-confirm-password">👁️</span>
    </div>
    <button id="signup-btn">Signup</button>
  </div>
</div>

<script>
// Helper Functions
function getClients() { return JSON.parse(localStorage.getItem("clients")) || []; }
function saveClients(clients) { localStorage.setItem("clients", JSON.stringify(clients)); }
function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

// Password toggle
document.addEventListener('click', e => {
  if(e.target.classList.contains('toggle-password')){
    const input = document.getElementById(e.target.dataset.target);
    input.type = input.type==='password'?'text':'password';
  }
});

// Tab switch
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(f=>f.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById(tab+'-tab').classList.add('active');
}
document.getElementById('login-tab').addEventListener('click', ()=>switchTab('login'));
document.getElementById('signup-tab').addEventListener('click', ()=>switchTab('signup'));

// ----------------------------
// Signup
// ----------------------------
document.getElementById('signup-btn').addEventListener('click', ()=>{
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirmPassword = document.getElementById('signup-confirm-password').value;
  const error = document.getElementById('signup-error');
  error.innerText='';

  if(!name || !email || !password || !confirmPassword){
    error.innerText="All fields are required!";
    return;
  }
  if(!validateEmail(email)){ error.innerText="Invalid email format!"; return; }
  if(password.length < 6){ error.innerText="Password must be at least 6 characters!"; return; }
  if(password !== confirmPassword){ error.innerText="Passwords do not match!"; return; }

  let clients = getClients();
  if(clients.find(c=>c.email===email)){ error.innerText="Email already registered!"; return; }

  const newClient = {name,email,password};
  clients.push(newClient);
  saveClients(clients);
  localStorage.setItem("currentClient", JSON.stringify(newClient));
  window.location.href = "clientdashboard.html";
});

// ----------------------------
// Login
// ----------------------------
document.getElementById('login-btn').addEventListener('click', ()=>{
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value.trim();
  const error=document.getElementById('login-error'); error.innerText='';

  if(!email||!password){ error.innerText="All fields required!"; return; }
  if(!validateEmail(email)){ error.innerText="Invalid email format!"; return; }

  const clients = getClients();
  const client = clients.find(c=>c.email===email && c.password===password);
  if(!client){ error.innerText="Invalid email or password!"; return; }

  localStorage.setItem("currentClient", JSON.stringify(client));
  window.location.href = "clientdashboard.html";
});

// ----------------------------
// Forgot Password
// ----------------------------
document.getElementById('forgot-btn').addEventListener('click', ()=>{
  const email = prompt("Enter your registered email:");
  if(!email || !validateEmail(email)){ return alert("Enter a valid email!"); }

  let clients = getClients();
  const client = clients.find(c => c.email === email);
  if(!client){ return alert("Email not found!"); }

  const newPassword = prompt("Enter new password (min 6 characters):");
  if(!newPassword || newPassword.length < 6){ return alert("Password must be at least 6 characters!"); }

  const confirmPassword = prompt("Confirm new password:");
  if(newPassword !== confirmPassword){ return alert("Passwords do not match!"); }

  client.password = newPassword;
  saveClients(clients);
  alert("Password reset successful!");
});
</script>

</body>
</html>
