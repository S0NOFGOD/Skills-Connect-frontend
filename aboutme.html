<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — About Me</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  min-height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px 0;
  color:#fff;
}
.about-container {
  width:95%;
  max-width:400px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
  text-align:center;
}
@keyframes fadeIn {from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.profile-img {
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin:0 auto 20px;
  border:3px solid #fff;
}
h2 {margin-bottom:10px;}
p {margin-bottom:8px;opacity:0.85;}
button {
  margin-top:20px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  transition:0.3s ease;
}
button:hover{transform:scale(1.03);}
</style>
</head>
<body>

<div class="about-container">
  <img src="https://via.placeholder.com/120" alt="Destiny Okpone" class="profile-img"/>
  <h2>Destiny Okpone</h2>
  <p>Founder of SkillConnect — Connecting skilled professionals with clients nearby. Passionate about creating tools that make finding local talent easy and efficient.</p>
  <p><strong>Education:</strong> LAUTECH</p>
  <p><strong>Department:</strong> Computer Science</p>
  <p><strong>Email:</strong> destiny.okpone@gmail.com</p>
  <button id="back-btn">Back to Dashboard</button>
</div>

<script>
document.getElementById('back-btn').addEventListener('click', ()=>{
  // Check if current user is a freelancer or client
  const currentUser = JSON.parse(localStorage.getItem("currentUser"));
  const currentClient = JSON.parse(localStorage.getItem("currentClient"));
  if(currentUser) window.location.href="freelancerdashboard.html";
  else if(currentClient) window.location.href="clientdashboard.html";
  else window.location.href="index.html";
});
</script>

</body>
</html>
