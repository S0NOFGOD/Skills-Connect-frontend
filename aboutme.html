<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>About Me — SkillConnect</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  padding:20px;
}
.container{
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
  text-align:center;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:20px;
  border:3px solid #fff;
}

h2{
  margin-bottom:10px;
  font-size:1.8rem;
  font-weight:700;
}

p{
  font-size:14px;
  margin-bottom:10px;
  opacity:0.85;
  line-height:1.5;
}

.back-btn{
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:12px;
  font-weight:600;
  text-decoration:none;
  color:#fff;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  transition:0.3s ease;
}
.back-btn:hover{transform:scale(1.05);}
</style>
</head>
<body>

<div class="container">
  <img src="https://i.ibb.co/2yXG1zR/profile.jpg" alt="Destiny Okpone">
  <h2>Destiny Okpone</h2>
  <p><strong>Founder of SkillConnect</strong></p>
  <p>SkillConnect connects skilled professionals with clients nearby for easy hiring and showcasing skills.</p>
  <p><strong>Skill:</strong> Web Development</p>
  <p><strong>Education:</strong> LAUTECH, Computer Science</p>
  <p><strong>Email:</strong> destiny.okpone@gmail.com</p>

  <a href="freelancerdashboard.html" class="back-btn" id="back-btn">Back to Dashboard</a>
</div>

<script>
// Determine which dashboard to go back to
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
const currentClient = JSON.parse(localStorage.getItem("currentClient"));
const backBtn = document.getElementById('back-btn');

if(currentUser){
  backBtn.href = "freelancerdashboard.html";
}else if(currentClient){
  backBtn.href = "clientdashboard.html";
}else{
  backBtn.href = "index.html";
}
</script>

</body>
</html>
