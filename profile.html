<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — User Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat',sans-serif;
}

/* GLOBAL BACKGROUND */
body {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  padding:20px;
}

/* GLASS CARD */
.profile-container {
  width:100%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius:20px;
  padding:40px 25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.1);
  text-align:center;
  margin-top:30px;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}

/* HEADINGS */
.profile-container h1 {
  font-size:1.8rem;
  margin-bottom:20px;
  font-weight:700;
}

.profile-container p {
  font-size:0.95rem;
  opacity:0.85;
  margin-bottom:30px;
  line-height:1.5;
}

/* FORM STYLING */
.profile-form {
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-bottom:20px;
}

.profile-form input,
.profile-form select {
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:0.95rem;
  background: rgba(255,255,255,0.1);
  color:#fff;
  backdrop-filter: blur(10px);
}

.profile-form input::placeholder {
  color:rgba(255,255,255,0.6);
}

.profile-form button {
  padding:14px;
  border-radius:12px;
  border:none;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:0.3s ease, box-shadow 0.3s ease;
}

.profile-form button:hover {
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 12px 25px rgba(0,0,0,0.45);
}

/* BACK BUTTON */
.back-btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 25px;
  border-radius:12px;
  background: linear-gradient(135deg,#ffa500,#ff6600);
  color:#fff;
  text-decoration:none;
  font-weight:600;
  transition:0.3s ease, box-shadow 0.3s ease;
}

.back-btn:hover {
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 12px 25px rgba(0,0,0,0.45);
}
</style>
</head>
<body>

<div class="profile-container">
  <h1>User Profile</h1>
  <p>Update your information below. All data is stored locally.</p>

  <form class="profile-form" id="profileForm">
    <input type="text" id="userName" placeholder="Full Name" required/>
    <input type="email" id="userEmail" placeholder="Email Address" required/>
    <select id="userRole" required>
      <option value="">Select Role</option>
      <option value="Freelancer">Freelancer</option>
      <option value="Client">Client</option>
    </select>
    <button type="submit">Save Profile</button>
  </form>

  <a href="index.html" class="back-btn">← Back to Home</a>
</div>

<script>
// Load profile from localStorage
const profileForm = document.getElementById('profileForm');
const userName = document.getElementById('userName');
const userEmail = document.getElementById('userEmail');
const userRole = document.getElementById('userRole');

let profile = JSON.parse(localStorage.getItem('profile')) || {};
if(profile.name) userName.value = profile.name;
if(profile.email) userEmail.value = profile.email;
if(profile.role) userRole.value = profile.role;

profileForm.addEventListener('submit', (e) => {
  e.preventDefault();
  profile = {
    name: userName.value,
    email: userEmail.value,
    role: userRole.value
  };
  localStorage.setItem('profile', JSON.stringify(profile));
  alert('Profile saved locally!');
});
</script>

</body>
</html>
