<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Freelancer Auth</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  min-height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}
.container {
  width:95%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn {from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
h1{text-align:center;font-weight:700;margin-bottom:10px;}
p{text-align:center;font-size:14px;opacity:0.85;margin-bottom:25px;}
input,select,button{width:100%;padding:14px;margin-bottom:15px;border-radius:12px;border:none;outline:none;font-size:14px;}
input,select{background:rgba(255,255,255,0.15);color:#fff;}
select option{color:#000;}
button{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;font-weight:600;cursor:pointer;transition:0.3s ease;}
button:hover{transform:scale(1.03);}
.tabs{display:flex;justify-content:space-around;margin-bottom:20px;}
.tab{padding:10px 20px;cursor:pointer;border-radius:12px;transition:0.3s ease;}
.tab.active{background:linear-gradient(135deg,#00c6ff,#0072ff);font-weight:700;}
.form-section{display:none;flex-direction:column;}
.form-section.active{display:flex;}
.error{color:#ff4b5c;font-size:12px;margin-bottom:10px;}
.password-wrapper{position:relative;width:100%;}
.password-wrapper input{padding-right:40px;}
.password-wrapper .toggle-password{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:18px;color:#fff;opacity:0.7;user-select:none;}
.password-wrapper .toggle-password:hover{opacity:1;}
#get-location-btn{background:linear-gradient(135deg,#ffb347,#ffcc33);color:#000;font-weight:600;cursor:pointer;margin-bottom:15px;}
</style>
</head>
<body>

<div class="container" id="auth-container">
  <h1>Freelancer Access</h1>
  <p>Sign up or log in to showcase your skills</p>

  <div class="tabs">
    <div class="tab active" id="login-tab">Login</div>
    <div class="tab" id="signup-tab">Signup</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="form-section active" id="login">
    <div class="error" id="login-error"></div>
    <input type="email" id="login-email" placeholder="Email" required />
    <div class="password-wrapper">
      <input type="password" id="login-password" placeholder="Password" required />
      <span class="toggle-password" data-target="login-password">👁️</span>
    </div>
    <button id="login-btn">Login</button>
    <button id="forgot-btn" style="background:linear-gradient(135deg,#ff6a00,#ee0979);margin-top:5px;">Forgot Password?</button>
  </div>

  <!-- SIGNUP FORM -->
  <div class="form-section" id="signup">
    <div class="error" id="signup-error"></div>
    <input type="text" id="signup-name" placeholder="Full Name" required />
    <input type="email" id="signup-email" placeholder="Email" required />
    <input type="text" id="signup-phone" placeholder="Phone Number" required />

    <button type="button" id="get-location-btn">Use My Current Location</button>
    <input type="text" id="signup-location" placeholder="Location (e.g., Yaba)" required readonly />

    <select id="signup-skill">
      <option value="">Select Skill</option>
      <option>Barber</option>
      <option>Phone Repairer</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Web Developer</option>
      <option>Cleaner</option>
    </select>

    <div class="password-wrapper">
      <input type="password" id="signup-password" placeholder="Password" required />
      <span class="toggle-password" data-target="signup-password">👁️</span>
    </div>
    <div class="password-wrapper">
      <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required />
      <span class="toggle-password" data-target="signup-confirm-password">👁️</span>
    </div>
    <input type="file" id="signup-image" accept="image/*" />
    <button id="signup-btn">Signup</button>
  </div>
</div>

<script>
// ----------------------------
// Helper Functions
// ----------------------------
function getUsers() { return JSON.parse(localStorage.getItem("users")) || []; }
function saveUsers(users) { localStorage.setItem("users", JSON.stringify(users)); }
function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
function validatePhone(phone) { return /^[0-9]{10,15}$/.test(phone); }

// Toggle password visibility
document.addEventListener('click', e => {
  if(e.target.classList.contains('toggle-password')){
    const input = document.getElementById(e.target.dataset.target);
    input.type = input.type==='password'?'text':'password';
  }
});

// Tab switch
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(f=>f.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.getElementById(tab+'-tab').classList.add('active');
}
document.getElementById('login-tab').addEventListener('click', ()=>switchTab('login'));
document.getElementById('signup-tab').addEventListener('click', ()=>switchTab('signup'));

// ----------------------------
// SIGNUP
// ----------------------------
document.getElementById('signup-btn').addEventListener('click', ()=>{
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const phone=document.getElementById('signup-phone').value.trim();
  const location=document.getElementById('signup-location').value.trim();
  const skill=document.getElementById('signup-skill').value;
  const password=document.getElementById('signup-password').value;
  const confirmPassword=document.getElementById('signup-confirm-password').value;
  const imageFile=document.getElementById('signup-image').files[0];
  const error=document.getElementById('signup-error');
  error.innerText='';

  if(!name||!email||!phone||!location||!skill||!password||!confirmPassword){
    error.innerText="All fields are required!"; return;
  }
  if(!validateEmail(email)){ error.innerText="Invalid email format!"; return; }
  if(!validatePhone(phone)){ error.innerText="Phone must be 10–15 digits!"; return; }
  if(password.length < 6){ error.innerText="Password must be at least 6 characters!"; return; }
  if(password !== confirmPassword){ error.innerText="Passwords do not match!"; return; }

  let users = getUsers();
  if(users.find(u => u.email === email)){ error.innerText="Email already registered!"; return; }

  let imageData = null;
  function completeSignup(){
    const newUser = { name,email,phone,location,skill,password,image:imageData };
    users.push(newUser);
    saveUsers(users);
    localStorage.setItem("currentUser", JSON.stringify(newUser));
    window.location.href = "freelancerdashboard.html";
  }
  if(imageFile){
    const reader = new FileReader();
    reader.onload = function(){ imageData = reader.result; completeSignup(); }
    reader.readAsDataURL(imageFile);
  } else { completeSignup(); }
});

// ----------------------------
// LOGIN
// ----------------------------
document.getElementById('login-btn').addEventListener('click', ()=>{
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value.trim();
  const error=document.getElementById('login-error');
  error.innerText='';
  if(!email||!password){ error.innerText="All fields required!"; return; }
  if(!validateEmail(email)){ error.innerText="Invalid email format!"; return; }

  const users = getUsers();
  const user = users.find(u => u.email===email && u.password===password);
  if(!user){ error.innerText="Invalid email or password!"; return; }

  localStorage.setItem("currentUser", JSON.stringify(user));
  window.location.href = "freelancerdashboard.html";
});

// ----------------------------
// FORGOT PASSWORD
// ----------------------------
document.getElementById('forgot-btn').addEventListener('click', ()=>{
  const email = prompt("Enter your registered email:");
  if(!email || !validateEmail(email)){ return alert("Enter a valid email!"); }
  let users = getUsers();
  const user = users.find(u => u.email===email);
  if(!user){ return alert("Email not found!"); }

  const newPassword = prompt("Enter new password (min 6 characters):");
  if(!newPassword || newPassword.length<6){ return alert("Password must be at least 6 characters!"); }
  const confirmPassword = prompt("Confirm new password:");
  if(newPassword!==confirmPassword){ return alert("Passwords do not match!"); }

  user.password = newPassword;
  saveUsers(users);
  alert("Password reset successful!");
});

// ----------------------------
// GET CURRENT LOCATION
// ----------------------------
document.getElementById('get-location-btn').addEventListener('click', ()=> {
  const locInput = document.getElementById('signup-location');
  locInput.value = 'Fetching...';
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(async (position)=>{
      const { latitude, longitude } = position.coords;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
        const data = await res.json();
        const city = data.address.city || data.address.town || data.address.village || '';
        const state = data.address.state || '';
        locInput.value = city && state ? `${city}, ${state}` : 'Location not found';
      } catch(e){ locInput.value='Unable to fetch location'; }
    }, ()=> { locInput.value='Permission denied'; });
  } else { locInput.value='Geolocation not supported'; }
});
</script>
</body>
</html>
