<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Freelancer Dashboard</title>  
  
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">  
  
<style>  
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}  
body{  
  min-height:100vh;  
  background:linear-gradient(135deg,#141e30,#243b55);  
  color:#fff;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
}  
.dashboard{  
  width:95%;  
  max-width:900px;  
  background:rgba(255,255,255,0.08);  
  backdrop-filter:blur(20px);  
  border-radius:25px;  
  padding:40px;  
  box-shadow:0 30px 70px rgba(0,0,0,0.5);  
  animation:fadeIn 0.8s ease;  
}  
@keyframes fadeIn{  
  from{opacity:0;transform:translateY(20px);}  
  to{opacity:1;transform:translateY(0);}  
}  
.profile{  
  display:flex;  
  align-items:center;  
  gap:30px;  
  margin-bottom:30px;  
}  
.profile img{  
  width:130px;  
  height:130px;  
  border-radius:50%;  
  object-fit:cover;  
  border:4px solid #00c6ff;  
}  
.profile-info h2{  
  font-size:26px;  
  margin-bottom:5px;  
}  
.badge{  
  display:inline-block;  
  padding:6px 14px;  
  border-radius:20px;  
  background:linear-gradient(135deg,#00c6ff,#0072ff);  
  font-size:13px;  
  font-weight:600;  
  margin-top:8px;  
}  
.info-grid{  
  display:grid;  
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));  
  gap:20px;  
  margin-top:20px;  
}  
.card{  
  background:rgba(255,255,255,0.1);  
  padding:20px;  
  border-radius:18px;  
  transition:0.3s ease;  
}  
.card:hover{  
  transform:translateY(-5px);  
}  
.card h4{  
  font-size:14px;  
  opacity:0.7;  
  margin-bottom:8px;  
}  
.btn-group{  
  display:flex;  
  gap:15px;  
  margin-top:30px;  
  flex-wrap: wrap;  
}  
.btn{  
  flex:1;  
  padding:14px;  
  border:none;  
  border-radius:14px;  
  font-weight:600;  
  cursor:pointer;  
  transition:0.3s ease;  
  color:#fff;  
}  
.logout-btn{background:linear-gradient(135deg,#ff416c,#ff4b2b);}  
.logout-btn:hover{transform:scale(1.03);}  
.delete-btn{background:linear-gradient(135deg,#ff7e5f,#feb47b);}  
.delete-btn:hover{transform:scale(1.03);}  
.about-btn{background:linear-gradient(135deg,#36d1dc,#5b86e5);}  
.about-btn:hover{transform:scale(1.03);}  
.edit-btn{background:linear-gradient(135deg,#11998e,#38ef7d);}  
.edit-btn:hover{transform:scale(1.03);}  
  
/* Edit Profile Modal */  
.modal{  
  position:fixed;  
  top:0;  
  left:0;  
  width:100%;  
  height:100%;  
  background:rgba(0,0,0,0.7);  
  display:none;  
  justify-content:center;  
  align-items:center;  
  z-index:1000;  
}  
.modal-content{  
  background:rgba(255,255,255,0.1);  
  backdrop-filter:blur(20px);  
  border-radius:20px;  
  padding:30px;  
  width:90%;  
  max-width:500px;  
  box-shadow:0 20px 50px rgba(0,0,0,0.5);  
  position:relative;  
}  
.modal-content h3{  
  margin-bottom:20px;  
  font-size:22px;  
  text-align:center;  
}  
.modal-content label{  
  display:block;  
  margin:10px 0 5px;  
  font-size:14px;  
  opacity:0.8;  
}  
.modal-content input, .modal-content select{  
  width:100%;  
  padding:10px;  
  border-radius:10px;  
  border:none;  
  margin-bottom:15px;  
}  
.modal-content input[type="file"]{  
  padding:3px;  
}  
.update-btn{  
  width:100%;  
  padding:12px;  
  border:none;  
  border-radius:12px;  
  background:linear-gradient(135deg,#36d1dc,#5b86e5);  
  font-weight:600;  
  cursor:pointer;  
  color:#fff;  
  transition:0.3s ease;  
}  
.update-btn:hover{transform:scale(1.03);}  
.close-modal{  
  position:absolute;  
  top:15px;  
  right:20px;  
  font-size:20px;  
  cursor:pointer;  
  opacity:0.8;  
}  
.close-modal:hover{opacity:1;}  
</style>  
</head>  
  
<body>  
  
<div class="dashboard">  
  
  <div class="profile">  
    <img id="profile-image" src="" alt="Profile">  
    <div class="profile-info">  
      <h2 id="user-name"></h2>  
      <div class="badge" id="user-skill"></div>  
    </div>  
  </div>  
  
  <div class="info-grid">  
    <div class="card">  
      <h4>Email</h4>  
      <p id="user-email"></p>  
    </div>  
    <div class="card">  
      <h4>Phone</h4>  
      <p id="user-phone"></p>  
    </div>  
    <div class="card">  
      <h4>Location</h4>  
      <p id="user-location"></p>  
    </div>  
  </div>  
  
  <div class="btn-group">  
    <button class="edit-btn btn" onclick="openEditModal()">Edit Profile</button>  
    <button class="about-btn btn" onclick="window.location.href='aboutme.html'">About Me</button>  
    <button class="delete-btn btn" onclick="deleteAccount()">Delete Account</button>  
    <button class="logout-btn btn" onclick="logout()">Logout</button>  
  </div>  
  
</div>  
  
<!-- Edit Profile Modal -->  
<div class="modal" id="editModal">  
  <div class="modal-content">  
    <span class="close-modal" onclick="closeEditModal()">&times;</span>  
    <h3>Edit Profile</h3>  
    <form id="editForm">  
      <label for="edit-name">Name</label>  
      <input type="text" id="edit-name" required>  
        
      <label for="edit-phone">Phone</label>  
      <input type="text" id="edit-phone" required>  
        
      <label for="edit-skill">Skill</label>  
      <select id="edit-skill" required>  
        <option value="">Select Skill</option>  
        <option value="Barber">Barber</option>  
        <option value="Tailoring">Tailoring</option>  
        <option value="Carpentry">Carpentry</option>  
        <option value="Plumbing">Plumbing</option>  
        <option value="Catering">Catering</option>  
        <option value="Mechanic">Mechanic</option>  
        <option value="Electrician">Electrician</option>  
      </select>  
        
      <label for="edit-location">Location</label>  
      <input type="text" id="edit-location" placeholder="Fetching..." readonly>  
      <button type="button" onclick="fetchLocation()" style="margin-bottom:15px;background:#0072ff;padding:8px 12px;border-radius:10px;border:none;color:#fff;cursor:pointer;">Use Current Location</button>  
        
      <label for="edit-image">Profile Image</label>  
      <input type="file" id="edit-image" accept="image/*">  
        
      <button type="submit" class="update-btn">Update Profile</button>  
    </form>  
  </div>  
</div>  
  
<script>  
let currentUser = JSON.parse(localStorage.getItem("currentUser"));  
  
if(!currentUser){  
  window.location.href = "index.html";  
}  
  
function displayUser(){  
  document.getElementById("user-name").innerText = currentUser.name;  
  document.getElementById("user-email").innerText = currentUser.email;  
  document.getElementById("user-phone").innerText = currentUser.phone;  
  document.getElementById("user-location").innerText = currentUser.location;  
  document.getElementById("user-skill").innerText = currentUser.skill;  
  document.getElementById("profile-image").src = currentUser.image || "https://via.placeholder.com/150";  
}  
displayUser();  
  
function logout(){  
  localStorage.removeItem("currentUser");  
  window.location.href = "index.html";  
}  
  
function deleteAccount(){  
  if(confirm("Are you sure you want to delete your account? This action cannot be undone.")){  
    let users = JSON.parse(localStorage.getItem("users")) || [];  
    users = users.filter(u => u.email !== currentUser.email);  
    localStorage.setItem("users", JSON.stringify(users));  
    localStorage.removeItem("currentUser");  
    alert("Account deleted successfully.");  
    window.location.href = "index.html";  
  }  
}  
  
// Edit Profile Modal  
const editModal = document.getElementById("editModal");  
function openEditModal(){  
  editModal.style.display = "flex";  
  document.getElementById("edit-name").value = currentUser.name;  
  document.getElementById("edit-phone").value = currentUser.phone;  
  document.getElementById("edit-skill").value = currentUser.skill;  
  document.getElementById("edit-location").value = currentUser.location;  
}  
function closeEditModal(){  
  editModal.style.display = "none";  
}  
  
document.getElementById("editForm").addEventListener("submit", function(e){  
  e.preventDefault();  
    
  const name = document.getElementById("edit-name").value.trim();  
  const phone = document.getElementById("edit-phone").value.trim();  
  const skill = document.getElementById("edit-skill").value;  
  const location = document.getElementById("edit-location").value;  
  const imageFile = document.getElementById("edit-image").files[0];  
  
  if(!name || !phone || !skill || !location){  
    alert("Please fill in all fields.");  
    return;  
  }  
  
  if(imageFile){  
    const reader = new FileReader();  
    reader.onload = function(){  
      currentUser.image = reader.result;  
      updateUser();  
    }  
    reader.readAsDataURL(imageFile);  
  } else {  
    updateUser();  
  }  
  
  function updateUser(){  
    currentUser.name = name;  
    currentUser.phone = phone;  
    currentUser.skill = skill;  
    currentUser.location = location;  
  
    localStorage.setItem("currentUser", JSON.stringify(currentUser));  
      
    let users = JSON.parse(localStorage.getItem("users")) || [];  
    users = users.map(u => u.email === currentUser.email ? currentUser : u);  
    localStorage.setItem("users", JSON.stringify(users));  
      
    displayUser();  
    closeEditModal();  
    alert("Profile updated successfully!");  
  }  
});  
  
// Location Finder  
function fetchLocation(){  
  const locInput = document.getElementById("edit-location");  
  locInput.value = "Fetching...";  
  if(navigator.geolocation){  
    navigator.geolocation.getCurrentPosition(async (position)=>{  
      const lat = position.coords.latitude;  
      const lon = position.coords.longitude;  
      try{  
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);  
        const data = await res.json();  
        locInput.value = `${data.address.city || data.address.town || data.address.village || data.address.county || ''}, ${data.address.state || ''}`;  
      }catch(err){  
        locInput.value = "Unable to fetch location";  
      }  
    }, ()=>{  
      locInput.value = "Location access denied";  
    });  
  }else{  
    locInput.value = "Geolocation not supported";  
  }  
}  
</script>  
  
</body>  
</html>
