<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer Dashboard - SkillConnect</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Montserrat',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;display:flex;align-items:center;justify-content:center;}
.container{width:95%;max-width:600px;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:20px;padding:30px;box-shadow:0 25px 60px rgba(0,0,0,0.4);}
h1{text-align:center;margin-bottom:20px;}
input,select,button{width:100%;padding:12px;margin-bottom:15px;border-radius:12px;border:none;font-size:14px;}
input,select{background:rgba(255,255,255,0.15);color:#fff;}
button{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;font-weight:600;cursor:pointer;transition:0.3s ease;}
button:hover{transform:scale(1.03);}
.actions{display:flex;gap:20px;}
.actions button{flex:1;}
</style>
</head>
<body>

<div class="container">
<h1 id="welcome-text">Welcome Freelancer</h1>

<div id="profile-section">
<label>Name:</label>
<input type="text" id="profile-name">
<label>Email:</label>
<input type="email" id="profile-email" disabled>
<label>Phone:</label>
<input type="text" id="profile-phone">
<label>Location:</label>
<input type="text" id="profile-location">
<label>Skill:</label>
<select id="profile-skill">
  <option>Barber</option>
  <option>Phone Repairer</option>
  <option>Electrician</option>
  <option>Plumber</option>
  <option>Web Developer</option>
  <option>Cleaner</option>
</select>
<label>Profile Image:</label>
<input type="file" id="profile-image">
<div class="actions">
  <button id="update-btn">Update Info</button>
  <button id="delete-btn" style="background:linear-gradient(135deg,#ff4b5c,#ff1e00);">Delete Account</button>
</div>
<button id="logout-btn" style="margin-top:15px;background:linear-gradient(135deg,#ffa500,#ff6600);">Logout</button>
</div>

<script>
// Load current user
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser){window.location.href='freelancer.html';}

document.getElementById('welcome-text').innerText=`Welcome, ${currentUser.name.split(' ')[0]}`;

// Populate fields
document.getElementById('profile-name').value=currentUser.name;
document.getElementById('profile-email').value=currentUser.email;
document.getElementById('profile-phone').value=currentUser.phone;
document.getElementById('profile-location').value=currentUser.location;
document.getElementById('profile-skill').value=currentUser.skill;

// Update info
document.getElementById('update-btn').addEventListener('click', ()=>{
  const users = JSON.parse(localStorage.getItem("users")) || [];
  const idx = users.findIndex(u=>u.email===currentUser.email);
  if(idx===-1) return alert("User not found!");

  users[idx].name = document.getElementById('profile-name').value;
  users[idx].phone = document.getElementById('profile-phone').value;
  users[idx].location = document.getElementById('profile-location').value;
  users[idx].skill = document.getElementById('profile-skill').value;

  const file = document.getElementById('profile-image').files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      users[idx].image = reader.result;
      saveAndReload();
    };
    reader.readAsDataURL(file);
  } else { saveAndReload(); }

  function saveAndReload(){
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", JSON.stringify(users[idx]));
    currentUser = users[idx];
    alert("Profile updated!");
  }
});

// Delete account
document.getElementById('delete-btn').addEventListener('click', ()=>{
  if(!confirm("Are you sure you want to delete your account?")) return;
  let users = JSON.parse(localStorage.getItem("users")) || [];
  users = users.filter(u=>u.email!==currentUser.email);
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.removeItem("currentUser");
  alert("Account deleted!");
  window.location.href='freelancer.html';
});

// Logout
document.getElementById('logout-btn').addEventListener('click', ()=>{
  localStorage.removeItem("currentUser");
  window.location.href='freelancer.html';
});
</script>

</div>
</body>
</html>
