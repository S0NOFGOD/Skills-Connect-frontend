<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Freelancer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  padding:20px;
  color:#fff;
}
.dashboard-container{
  width:95%;
  max-width:500px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
h1{text-align:center;font-weight:700;margin-bottom:20px;}
.profile-img{
  width:120px;height:120px;border-radius:50%;object-fit:cover;margin:0 auto 20px;display:block;border:3px solid #fff;
}
.info{margin-bottom:15px;font-size:14px;}
label{display:block;margin-bottom:5px;font-weight:600;}
input,select,button{width:100%;padding:12px;margin-bottom:15px;border-radius:12px;border:none;outline:none;font-size:14px;}
input,select{background:rgba(255,255,255,0.15);color:#fff;}
select option{color:#000;}
button{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;font-weight:600;cursor:pointer;transition:0.3s ease;}
button:hover{transform:scale(1.03);}
.edit-form{display:none;flex-direction:column;}
.toggle-btns{display:flex;justify-content:space-between;gap:10px;margin-bottom:20px;}
.toggle-btns button{flex:1;}
.delete-btn{background:linear-gradient(135deg,#ff4b5c,#ff0000);}
</style>
</head>
<body>

<div class="dashboard-container">
  <h1>Freelancer Dashboard</h1>
  <img src="" alt="Profile Image" id="profile-img" class="profile-img">
  <div class="info"><strong>Name:</strong> <span id="display-name"></span></div>
  <div class="info"><strong>Email:</strong> <span id="display-email"></span></div>
  <div class="info"><strong>Phone:</strong> <span id="display-phone"></span></div>
  <div class="info"><strong>Location:</strong> <span id="display-location"></span></div>
  <div class="info"><strong>Skill:</strong> <span id="display-skill"></span></div>

  <div class="toggle-btns">
    <button id="aboutme-btn">About Me</button>
    <button id="edit-btn">Edit Info</button>
  </div>
  <button id="delete-btn" class="delete-btn">Delete Account</button>

  <div class="edit-form" id="edit-form">
    <label>Name</label>
    <input type="text" id="edit-name">
    <label>Email</label>
    <input type="email" id="edit-email">
    <label>Phone</label>
    <input type="text" id="edit-phone">
    <label>Location</label>
    <input type="text" id="edit-location">
    <label>Skill</label>
    <select id="edit-skill">
      <option>Barber</option>
      <option>Phone Repairer</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Web Developer</option>
      <option>Cleaner</option>
    </select>
    <label>Profile Image</label>
    <input type="file" id="edit-image" accept="image/*">
    <button id="save-btn">Save Changes</button>
    <button id="cancel-btn" style="background:linear-gradient(135deg,#ff6a00,#ee0979);">Cancel</button>
  </div>
</div>

<script>
// ----------------------------
// FETCH CURRENT USER
// ----------------------------
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser){ alert("No user logged in!"); window.location.href="freelancer.html"; }

const profileImg = document.getElementById("profile-img");
const displayName = document.getElementById("display-name");
const displayEmail = document.getElementById("display-email");
const displayPhone = document.getElementById("display-phone");
const displayLocation = document.getElementById("display-location");
const displaySkill = document.getElementById("display-skill");

function displayProfile(){
  profileImg.src = currentUser.image || "https://via.placeholder.com/120";
  displayName.innerText = currentUser.name;
  displayEmail.innerText = currentUser.email;
  displayPhone.innerText = currentUser.phone;
  displayLocation.innerText = currentUser.location;
  displaySkill.innerText = currentUser.skill;
}

displayProfile();

// ----------------------------
// ABOUT ME BUTTON
// ----------------------------
document.getElementById("aboutme-btn").addEventListener("click", ()=>{
  window.location.href="aboutme.html";
});

// ----------------------------
// EDIT FORM
// ----------------------------
const editForm = document.getElementById("edit-form");
document.getElementById("edit-btn").addEventListener("click", ()=>{
  editForm.style.display = "flex";
  document.getElementById("edit-name").value = currentUser.name;
  document.getElementById("edit-email").value = currentUser.email;
  document.getElementById("edit-phone").value = currentUser.phone;
  document.getElementById("edit-location").value = currentUser.location;
  document.getElementById("edit-skill").value = currentUser.skill;
});

// CANCEL EDIT
document.getElementById("cancel-btn").addEventListener("click", ()=>{
  editForm.style.display = "none";
});

// SAVE CHANGES
document.getElementById("save-btn").addEventListener("click", ()=>{
  const name = document.getElementById("edit-name").value.trim();
  const email = document.getElementById("edit-email").value.trim();
  const phone = document.getElementById("edit-phone").value.trim();
  const location = document.getElementById("edit-location").value.trim();
  const skill = document.getElementById("edit-skill").value;
  const imageFile = document.getElementById("edit-image").files[0];

  if(!name||!email||!phone||!location||!skill){ alert("All fields required!"); return;}

  let users = JSON.parse(localStorage.getItem("users")) || [];
  if(users.some(u=>u.email===email && u.email!==currentUser.email)){ alert("Email already used!"); return;}

  function updateUser(imageData=null){
    currentUser.name=name;
    currentUser.email=email;
    currentUser.phone=phone;
    currentUser.location=location;
    currentUser.skill=skill;
    if(imageData) currentUser.image=imageData;

    const index = users.findIndex(u=>u.email===currentUser.email);
    if(index>-1){ users[index]=currentUser; }
    localStorage.setItem("users",JSON.stringify(users));
    localStorage.setItem("currentUser",JSON.stringify(currentUser));
    displayProfile();
    editForm.style.display="none";
    alert("Profile updated successfully!");
  }

  if(imageFile){
    const reader = new FileReader();
    reader.onload=function(){ updateUser(reader.result); }
    reader.readAsDataURL(imageFile);
  } else { updateUser(); }
});

// ----------------------------
// DELETE ACCOUNT
// ----------------------------
document.getElementById("delete-btn").addEventListener("click", ()=>{
  if(confirm("Are you sure you want to delete your account?")){
    let users = JSON.parse(localStorage.getItem("users")) || [];
    users = users.filter(u=>u.email!==currentUser.email);
    localStorage.setItem("users",JSON.stringify(users));
    localStorage.removeItem("currentUser");
    alert("Account deleted successfully!");
    window.location.href="freelancer.html";
  }
});
</script>
</body>
</html>
