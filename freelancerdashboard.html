<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Freelancer Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.dashboard-container{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.profile-image{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin:0 auto 20px;
  display:block;
}

.profile-info{margin-bottom:20px;}
.profile-info p{margin-bottom:10px;font-size:14px;}

.button-group{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px;}
button{padding:12px 20px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:0.3s ease;}
button:hover{transform:scale(1.03);}
.about-btn{background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;}
.edit-btn{background:linear-gradient(135deg,#ffa500,#ff6600);color:#fff;}
.logout-btn{background:linear-gradient(135deg,#ff4b5c,#ff6a95);color:#fff;}
.delete-btn{background:linear-gradient(135deg,#ff0000,#aa0000);color:#fff;}

.edit-form{display:none;flex-direction:column;margin-top:20px;}
.edit-form input, .edit-form select{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:12px;
  border:none;
  outline:none;
  font-size:14px;
  background:rgba(255,255,255,0.15);
  color:#fff;
}
.edit-form button{width:100%;}

.error{color:#ff4b5c;font-size:12px;margin-bottom:10px;}
.password-wrapper{position:relative;width:100%;}
.password-wrapper input{padding-right:40px;}
.password-wrapper .toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:18px;
  color:#fff;
  opacity:0.7;
  user-select:none;
}
.password-wrapper .toggle-password:hover{opacity:1;}
</style>
</head>
<body>

<div class="dashboard-container">
  <img src="" alt="Profile Image" class="profile-image" id="profile-image">
  <div class="profile-info" id="profile-info">
    <p><strong>Name:</strong> <span id="profile-name"></span></p>
    <p><strong>Email:</strong> <span id="profile-email"></span></p>
    <p><strong>Phone:</strong> <span id="profile-phone"></span></p>
    <p><strong>Skill:</strong> <span id="profile-skill"></span></p>
  </div>

  <div class="button-group">
    <button class="about-btn" id="about-btn">About Me</button>
    <button class="edit-btn" id="edit-btn">Edit Info</button>
    <button class="logout-btn" id="logout-btn">Log Out</button>
    <button class="delete-btn" id="delete-btn">Delete Account</button>
  </div>

  <div class="edit-form" id="edit-form">
    <div class="error" id="edit-error"></div>
    <input type="text" id="edit-name" placeholder="Full Name" required>
    <input type="email" id="edit-email" placeholder="Email" required>
    <input type="text" id="edit-phone" placeholder="Phone Number" required>
    <select id="edit-skill">
      <option value="">Select Skill</option>
      <option>Barber</option>
      <option>Phone Repairer</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Web Developer</option>
      <option>Cleaner</option>
    </select>
    <input type="file" id="edit-image" accept="image/*">
    <button id="save-btn">Save Changes</button>
  </div>
</div>

<script>
// Helper functions
function getUsers(){ return JSON.parse(localStorage.getItem("users")) || []; }
function saveUsers(users){ localStorage.setItem("users", JSON.stringify(users)); }
function validateEmail(email){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
function validatePhone(phone){ return /^[0-9]{10,15}$/.test(phone); }

// Load current user
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser) window.location.href = "freelancer.html";

const profileImage = document.getElementById('profile-image');
const profileName = document.getElementById('profile-name');
const profileEmail = document.getElementById('profile-email');
const profilePhone = document.getElementById('profile-phone');
const profileSkill = document.getElementById('profile-skill');

function renderProfile(){
  profileImage.src = currentUser.image || "https://via.placeholder.com/120";
  profileName.innerText = currentUser.name;
  profileEmail.innerText = currentUser.email;
  profilePhone.innerText = currentUser.phone;
  profileSkill.innerText = currentUser.skill;
}
renderProfile();

// About Me button
document.getElementById('about-btn').addEventListener('click', ()=>{
  window.location.href = "aboutme.html";
});

// Logout
document.getElementById('logout-btn').addEventListener('click', ()=>{
  localStorage.removeItem("currentUser");
  window.location.href = "freelancer.html";
});

// Delete account
document.getElementById('delete-btn').addEventListener('click', ()=>{
  if(confirm("Are you sure you want to delete your account?")){
    let users = getUsers();
    users = users.filter(u => u.email !== currentUser.email);
    saveUsers(users);
    localStorage.removeItem("currentUser");
    window.location.href = "freelancer.html";
  }
});

// Edit Info toggle
const editForm = document.getElementById('edit-form');
document.getElementById('edit-btn').addEventListener('click', ()=>{
  editForm.style.display = editForm.style.display === "flex" ? "none" : "flex";
  if(editForm.style.display==="flex"){
    document.getElementById('edit-name').value = currentUser.name;
    document.getElementById('edit-email').value = currentUser.email;
    document.getElementById('edit-phone').value = currentUser.phone;
    document.getElementById('edit-skill').value = currentUser.skill;
  }
});

// Save changes
document.getElementById('save-btn').addEventListener('click', ()=>{
  const name = document.getElementById('edit-name').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const skill = document.getElementById('edit-skill').value;
  const imageFile = document.getElementById('edit-image').files[0];
  const error = document.getElementById('edit-error');
  error.innerText = "";

  if(!name||!email||!phone||!skill){ error.innerText="All fields are required!"; return; }
  if(!validateEmail(email)){ error.innerText="Invalid email format!"; return; }
  if(!validatePhone(phone)){ error.innerText="Phone must be 10–15 digits!"; return; }

  let users = getUsers();
  // Check if email is used by others
  if(users.find(u => u.email===email && u.email!==currentUser.email)){ error.innerText="Email already in use!"; return; }

  function saveUpdate(imageData){
    currentUser.name = name;
    currentUser.email = email;
    currentUser.phone = phone;
    currentUser.skill = skill;
    if(imageData) currentUser.image = imageData;

    // update users array
    users = users.map(u=> u.email===currentUser.email?currentUser:u);
    saveUsers(users);
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
    renderProfile();
    editForm.style.display="none";
    alert("Profile updated successfully!");
  }

  if(imageFile){
    const reader = new FileReader();
    reader.onload = function(){ saveUpdate(reader.result); }
    reader.readAsDataURL(imageFile);
  } else {
    saveUpdate();
  }
});
</script>

</body>
</html>
