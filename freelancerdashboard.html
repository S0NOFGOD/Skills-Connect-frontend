<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

.dashboard{
  width:95%;
  max-width:900px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:25px;
  padding:40px;
  box-shadow:0 30px 70px rgba(0,0,0,0.5);
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.profile{
  display:flex;
  align-items:center;
  gap:30px;
  margin-bottom:30px;
}

.profile img{
  width:130px;
  height:130px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #00c6ff;
}

.profile-info h2{
  font-size:26px;
  margin-bottom:5px;
}

.badge{
  display:inline-block;
  padding:6px 14px;
  border-radius:20px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  font-size:13px;
  font-weight:600;
  margin-top:8px;
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:18px;
  transition:0.3s ease;
}

.card:hover{
  transform:translateY(-5px);
}

.card h4{
  font-size:14px;
  opacity:0.7;
  margin-bottom:8px;
}

.logout-btn{
  margin-top:30px;
  padding:14px;
  width:100%;
  border:none;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(135deg,#ff416c,#ff4b2b);
  color:#fff;
  transition:0.3s ease;
}

.logout-btn:hover{
  transform:scale(1.03);
}

</style>
</head>

<body>

<div class="dashboard">

  <div class="profile">
    <img id="profile-image" src="" alt="Profile">
    <div class="profile-info">
      <h2 id="user-name"></h2>
      <div class="badge" id="user-skill"></div>
    </div>
  </div>

  <div class="info-grid">
    <div class="card">
      <h4>Email</h4>
      <p id="user-email"></p>
    </div>
    <div class="card">
      <h4>Phone</h4>
      <p id="user-phone"></p>
    </div>
    <div class="card">
      <h4>Location</h4>
      <p id="user-location"></p>
    </div>
  </div>

  <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script>

const currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
  window.location.href = "index.html";
}

document.getElementById("user-name").innerText = currentUser.name;
document.getElementById("user-email").innerText = currentUser.email;
document.getElementById("user-phone").innerText = currentUser.phone;
document.getElementById("user-location").innerText = currentUser.location;
document.getElementById("user-skill").innerText = currentUser.skill;

if(currentUser.image){
  document.getElementById("profile-image").src = currentUser.image;
}else{
  document.getElementById("profile-image").src = "https://via.placeholder.com/150";
}

function logout(){
  localStorage.removeItem("currentUser");
  window.location.href = "index.html";
}

</script>

</body>
</html>
