<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Freelancer Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  min-height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  padding:20px 0;
  color:#fff;
}
.dashboard-container {
  width:95%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn {from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

.profile-img {
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  margin:0 auto 20px;
  display:block;
  border:3px solid #fff;
}
h2 {text-align:center;margin-bottom:10px;}
p {text-align:center;margin-bottom:5px;opacity:0.85;}

.button-group {
  display:flex;
  justify-content:space-between;
  margin-top:20px;
  flex-wrap:wrap;
  gap:10px;
}
button {
  flex:1;
  padding:12px 0;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s ease;
  color:#fff;
}
.edit-btn {background:linear-gradient(135deg,#00c6ff,#0072ff);}
.delete-btn {background:linear-gradient(135deg,#ff4b5c,#ff0000);}
.about-btn {background:linear-gradient(135deg,#ffa500,#ff6600);}
button:hover{transform:scale(1.03);}

/* EDIT FORM */
.edit-form {display:none; flex-direction:column; margin-top:20px;}
.edit-form input, .edit-form select {margin-bottom:15px; padding:12px; border-radius:12px; border:none; outline:none; font-size:14px; background:rgba(255,255,255,0.15); color:#fff;}
.edit-form input[type=file] {padding:5px;}
.save-btn {background:linear-gradient(135deg,#00ff72,#00c851);}
.error {color:#ff4b5c;font-size:12px;margin-bottom:10px;}
</style>
</head>
<body>

<div class="dashboard-container">
  <img src="" alt="Profile Image" class="profile-img" id="profile-img"/>
  <h2 id="name"></h2>
  <p id="email"></p>
  <p id="phone"></p>
  <p id="skill"></p>

  <div class="button-group">
    <button class="about-btn" id="about-btn">About Me</button>
    <button class="edit-btn" id="edit-btn">Edit Info</button>
    <button class="delete-btn" id="delete-btn">Delete Account</button>
  </div>

  <form class="edit-form" id="edit-form">
    <div class="error" id="edit-error"></div>
    <input type="text" id="edit-name" placeholder="Full Name"/>
    <input type="email" id="edit-email" placeholder="Email"/>
    <input type="text" id="edit-phone" placeholder="Phone Number"/>
    <input type="text" id="edit-location" placeholder="Location"/>
    <select id="edit-skill">
      <option value="">Select Skill</option>
      <option>Barber</option>
      <option>Phone Repairer</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Web Developer</option>
      <option>Cleaner</option>
    </select>
    <input type="file" id="edit-image"/>
    <button type="button" class="save-btn" id="save-btn">Save Changes</button>
  </form>
</div>

<script>
// Fetch current user
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser){ alert("No user logged in"); window.location.href="freelancer.html"; }

const profileImg = document.getElementById('profile-img');
const nameEl = document.getElementById('name');
const emailEl = document.getElementById('email');
const phoneEl = document.getElementById('phone');
const skillEl = document.getElementById('skill');

function renderProfile(){
  profileImg.src = currentUser.image || "https://via.placeholder.com/100";
  nameEl.innerText = currentUser.name;
  emailEl.innerText = currentUser.email;
  phoneEl.innerText = currentUser.phone;
  skillEl.innerText = currentUser.skill;
}
renderProfile();

// ABOUT ME BUTTON
document.getElementById('about-btn').addEventListener('click', ()=>{
  window.location.href="aboutme.html";
});

// EDIT INFO
const editBtn = document.getElementById('edit-btn');
const editForm = document.getElementById('edit-form');
editBtn.addEventListener('click', ()=>{
  editForm.style.display = editForm.style.display==='flex'?'none':'flex';
  if(editForm.style.display==='flex'){
    document.getElementById('edit-name').value=currentUser.name;
    document.getElementById('edit-email').value=currentUser.email;
    document.getElementById('edit-phone').value=currentUser.phone;
    document.getElementById('edit-location').value=currentUser.location;
    document.getElementById('edit-skill').value=currentUser.skill;
  }
});

// SAVE CHANGES
document.getElementById('save-btn').addEventListener('click', ()=>{
  const name = document.getElementById('edit-name').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const location = document.getElementById('edit-location').value.trim();
  const skill = document.getElementById('edit-skill').value;
  const imageFile = document.getElementById('edit-image').files[0];
  const error = document.getElementById('edit-error');
  error.innerText='';

  if(!name||!email||!phone||!location||!skill){ error.innerText="All fields required!"; return; }

  // Update image if selected
  function completeUpdate(imageData){
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let index = users.findIndex(u=>u.email===currentUser.email);
    if(index!==-1){
      users[index] = { ...users[index], name,email,phone,location,skill, image:imageData || currentUser.image };
      localStorage.setItem("users", JSON.stringify(users));
      currentUser = users[index];
      localStorage.setItem("currentUser", JSON.stringify(currentUser));
      renderProfile();
      editForm.style.display='none';
      alert("Profile updated successfully!");
    }
  }

  if(imageFile){
    const reader = new FileReader();
    reader.onload = function(){ completeUpdate(reader.result); }
    reader.readAsDataURL(imageFile);
  } else { completeUpdate(); }
});

// DELETE ACCOUNT
document.getElementById('delete-btn').addEventListener('click', ()=>{
  if(confirm("Are you sure you want to delete your account?")){
    let users = JSON.parse(localStorage.getItem("users")) || [];
    users = users.filter(u=>u.email!==currentUser.email);
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.removeItem("currentUser");
    alert("Account deleted successfully!");
    window.location.href="freelancer.html";
  }
});
</script>
</body>
</html>
