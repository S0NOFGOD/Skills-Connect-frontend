<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Montserrat',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:flex-start; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; padding-top:50px;}
.dashboard-container{width:95%;max-width:500px; background:rgba(255,255,255,0.08); backdrop-filter:blur(20px); border-radius:20px; padding:30px; box-shadow:0 25px 60px rgba(0,0,0,0.4);}
img{width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:20px;}
button{padding:10px 20px; margin:5px; border:none; border-radius:12px; font-weight:600; cursor:pointer; transition:0.3s;}
#about-btn{background:linear-gradient(135deg,#33ccff,#0066ff); color:#fff;}
#edit-btn{background:linear-gradient(135deg,#ffa500,#ff6600); color:#000;}
#delete-btn{background:linear-gradient(135deg,#ff4b5c,#ff1e00); color:#fff;}
.edit-form{display:none; flex-direction:column; margin-top:20px;}
.edit-form input, .edit-form select{margin-bottom:10px; padding:10px; border-radius:12px; border:none;}
.save-btn{background:linear-gradient(135deg,#00c6ff,#0072ff); color:#fff;}
</style>
</head>
<body>
<div class="dashboard-container">
<h2 id="welcome-msg">Welcome, Freelancer!</h2>
<img id="profile-img" src="" alt="Profile Image">
<p><strong>Name:</strong> <span id="display-name"></span></p>
<p><strong>Email:</strong> <span id="display-email"></span></p>
<p><strong>Phone:</strong> <span id="display-phone"></span></p>
<p><strong>Skill:</strong> <span id="display-skill"></span></p>

<button id="about-btn" onclick="window.location.href='aboutMe.html'">About Me</button>
<button id="edit-btn">Edit Info</button>
<button id="delete-btn">Delete Account</button>

<div class="edit-form" id="edit-form">
<input type="text" id="edit-name" placeholder="Full Name">
<input type="email" id="edit-email" placeholder="Email">
<input type="text" id="edit-phone" placeholder="Phone">
<select id="edit-skill">
<option>Barber</option>
<option>Phone Repairer</option>
<option>Electrician</option>
<option>Plumber</option>
<option>Web Developer</option>
<option>Cleaner</option>
</select>
<input type="file" id="edit-image" accept="image/*">
<button class="save-btn" id="save-btn">Update Info</button>
</div>
</div>

<script>
// Load current user
let currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(!currentUser){ window.location.href='freelancer.html'; }

function displayUser(user){
document.getElementById('welcome-msg').innerText = `Welcome, ${user.name}!`;
document.getElementById('display-name').innerText = user.name;
document.getElementById('display-email').innerText = user.email;
document.getElementById('display-phone').innerText = user.phone;
document.getElementById('display-skill').innerText = user.skill;
document.getElementById('profile-img').src = user.image || 'https://via.placeholder.com/120';
}

displayUser(currentUser);

// Edit button toggle
document.getElementById('edit-btn').addEventListener('click', ()=>{
const form = document.getElementById('edit-form');
form.style.display = form.style.display==='flex'?'none':'flex';
document.getElementById('edit-name').value = currentUser.name;
document.getElementById('edit-email').value = currentUser.email;
document.getElementById('edit-phone').value = currentUser.phone;
document.getElementById('edit-skill').value = currentUser.skill;
});

// Save updated info
document.getElementById('save-btn').addEventListener('click', ()=>{
let users = JSON.parse(localStorage.getItem('users')) || [];
currentUser.name = document.getElementById('edit-name').value;
currentUser.email = document.getElementById('edit-email').value;
currentUser.phone = document.getElementById('edit-phone').value;
currentUser.skill = document.getElementById('edit-skill').value;

const imageFile = document.getElementById('edit-image').files[0];
if(imageFile){
const reader = new FileReader();
reader.onload = function(){ currentUser.image = reader.result; finishUpdate(); }
reader.readAsDataURL(imageFile);
} else { finishUpdate(); }

function finishUpdate(){
const index = users.findIndex(u=>u.email===currentUser.email);
if(index!==-1){ users[index]=currentUser; localStorage.setItem('users',JSON.stringify(users)); localStorage.setItem('currentUser',JSON.stringify(currentUser)); displayUser(currentUser); alert('Profile updated!'); document.getElementById('edit-form').style.display='none'; }
}
});

// Delete user
document.getElementById('delete-btn').addEventListener('click', ()=>{
if(confirm('Are you sure you want to delete your account?')){
let users = JSON.parse(localStorage.getItem('users')) || [];
users = users.filter(u => u.email !== currentUser.email);
localStorage.setItem('users',JSON.stringify(users));
localStorage.removeItem('currentUser');
alert('Account deleted!');
window.location.href='freelancer.html';
}
});
</script>
</body>
</html>
