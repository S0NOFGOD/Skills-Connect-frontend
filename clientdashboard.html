<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;padding:15px;}
.dashboard-container{max-width:500px;margin:0 auto;}
.profile-card,.search-card,.freelancer-card{background: rgba(255,255,255,0.08);backdrop-filter: blur(25px);border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:0 15px 40px rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.12);}
.profile-card{display:flex;align-items:center;gap:15px;}
.profile-card img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #fff;}
.profile-card div{flex:1;}
.profile-card h2{font-size:1.2rem;font-weight:700;margin-bottom:5px;}
.profile-card p{font-size:0.9rem;opacity:0.8;}

/* SEARCH FILTER CARD */
.search-card h3{margin-bottom:15px;font-weight:600;}
.search-card select{width:100%;padding:12px;margin-bottom:10px;border-radius:12px;border:none;outline:none;background: rgba(255,255,255,0.15);color:#fff;font-size:14px;}
.search-card select option{color:#000;}

/* FREELANCER LIST */
.freelancers{display:flex;flex-direction:column;gap:15px;}
.freelancer-card{display:flex;flex-direction:column;gap:10px;transition:0.25s ease;}
.freelancer-card:hover{transform:scale(1.02);}
.freelancer-card > div:first-child{display:flex;justify-content:space-between;align-items:center;}
.freelancer-card button{padding:8px 12px;border:none;border-radius:12px;background: linear-gradient(135deg,#ffa500,#ff6600);color:#fff;font-weight:600;cursor:pointer;transition:0.25s ease;}
.freelancer-card button:hover{transform:scale(1.05);}
.review-item{background: rgba(255,255,255,0.12);padding:8px 12px;border-radius:12px;margin-top:5px;font-size:0.85rem;opacity:0.9;}
.review-item p{margin:3px 0;}

/* BOTTOM NAVIGATION */
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;max-width:500px;display:flex;justify-content:space-around;background: rgba(0,0,0,0.6);backdrop-filter: blur(20px);padding:12px 0;border-top-left-radius:20px;border-top-right-radius:20px;}
.bottom-nav a{color:#fff;text-decoration:none;font-size:14px;font-weight:600;}

/* REVIEW MODAL */
#review-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background: rgba(0,0,0,0.7);justify-content:center;align-items:center;z-index:1000;}
#review-modal .modal-content{background: rgba(255,255,255,0.1);backdrop-filter: blur(25px);padding:20px;border-radius:20px;width:90%;max-width:400px;color:#fff;position:relative;}
#review-modal h3{margin-bottom:10px;}
#review-modal label{display:block;margin:10px 0 5px;}
#review-modal input[type=number], #review-modal textarea{width:100%;padding:10px;border-radius:12px;border:none;outline:none;background: rgba(255,255,255,0.15);color:#fff;}
#review-modal textarea{resize:none;}
#review-modal button{margin-top:15px;width:100%;padding:10px;border:none;border-radius:12px;background: linear-gradient(135deg,#ffa500,#ff6600);color:#fff;font-weight:600;cursor:pointer;}
#review-modal button:hover{transform:scale(1.03);}
#review-modal .close-btn{position:absolute;top:10px;right:15px;font-size:18px;cursor:pointer;}
</style>
</head>
<body>

<div class="dashboard-container">

  <!-- PROFILE -->
  <div class="profile-card">
    <img src="" id="profile-img"/>
    <div>
      <h2 id="profile-name"></h2>
      <p id="profile-email"></p>
      <p id="profile-location"></p>
    </div>
  </div>

  <!-- SEARCH FILTER -->
  <div class="search-card">
    <h3>🔍 Find Freelancers</h3>
    <select id="skill-filter">
      <option value="">All Skills</option>
      <option>Barber</option>
      <option>Phone Repairer</option>
      <option>Electrician</option>
      <option>Plumber</option>
      <option>Web Developer</option>
      <option>Cleaner</option>
    </select>

    <select id="rating-filter">
      <option value="">All Ratings</option>
      <option value="5">5⭐</option>
      <option value="4">4⭐ & above</option>
      <option value="3">3⭐ & above</option>
    </select>
  </div>

  <!-- FREELANCERS LIST -->
  <div class="freelancers" id="freelancers-list"></div>

</div>

<!-- REVIEW MODAL -->
<div id="review-modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <h3 id="modal-freelancer-name"></h3>
    <label for="rating">Rating (1-5):</label>
    <input type="number" id="rating" min="1" max="5">
    <label for="comment">Comment:</label>
    <textarea id="comment" rows="3"></textarea>
    <button onclick="submitReview()">Submit Review</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="index.html">Home</a>
  <a href="#">About</a>
  <a href="#">Profile</a>
</div>

<script>
// CURRENT CLIENT
const currentClient = JSON.parse(localStorage.getItem("currentClient")) || {name:"Client Name", email:"client@example.com", location:"Lagos"};
document.getElementById('profile-name').innerText = currentClient.name;
document.getElementById('profile-email').innerText = "Email: " + currentClient.email;
document.getElementById('profile-location').innerText = "Location: " + currentClient.location;
document.getElementById('profile-img').src = "https://via.placeholder.com/60";

// FREELANCERS & REVIEWS
let freelancers = JSON.parse(localStorage.getItem("users")) || [];
let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

const list = document.getElementById("freelancers-list");

function getRating(email){
  const userReviews = reviews.filter(r => r.freelancerEmail === email);
  if(userReviews.length === 0) return 0;
  return userReviews.reduce((sum,r)=>sum+r.rating,0)/userReviews.length;
}

function render(){
  list.innerHTML = "";

  const skill = document.getElementById("skill-filter").value;
  const ratingFilter = document.getElementById("rating-filter").value;

  const filtered = freelancers.filter(f => {
    const sameLocation = f.location.toLowerCase() === currentClient.location.toLowerCase();
    const matchSkill = !skill || f.skill === skill;
    const rating = getRating(f.email);
    const matchRating = !ratingFilter || rating >= parseInt(ratingFilter);
    return sameLocation && matchSkill && matchRating;
  });

  if(filtered.length === 0){
    list.innerHTML = "<p>No freelancers found</p>";
    return;
  }

  filtered.forEach(f => {
    const rating = getRating(f.email).toFixed(1);
    const userReviews = reviews.filter(r => r.freelancerEmail === f.email);

    const card = document.createElement("div");
    card.className = "freelancer-card";

    // FREELANCER INFO + BUTTON
    const topDiv = document.createElement("div");
    topDiv.innerHTML = `
      <div>
        <h3>${f.name}</h3>
        <p>${f.skill}</p>
        <p>${f.location}</p>
        <p>⭐ ${rating}</p>
      </div>
      <button onclick="openModal('${f.email}','${f.name}')">Rate</button>
    `;
    card.appendChild(topDiv);

    // REVIEWS LIST
    userReviews.forEach(r => {
      const reviewDiv = document.createElement("div");
      reviewDiv.className = "review-item";
      reviewDiv.innerHTML = `<p><strong>${r.clientName}</strong>: ⭐ ${r.rating}</p><p>${r.comment}</p>`;
      card.appendChild(reviewDiv);
    });

    list.appendChild(card);
  });
}

render();
document.getElementById("skill-filter").onchange = render;
document.getElementById("rating-filter").onchange = render;

// REVIEW MODAL LOGIC
let currentFreelancerEmail = "";
function openModal(email, name){
  currentFreelancerEmail = email;
  document.getElementById("modal-freelancer-name").innerText = `Review ${name}`;
  document.getElementById("rating").value = "";
  document.getElementById("comment").value = "";
  document.getElementById("review-modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("review-modal").style.display = "none";
}

function submitReview(){
  const rating = parseInt(document.getElementById("rating").value);
  const comment = document.getElementById("comment").value.trim();
  if(!rating || rating < 1 || rating > 5 || !comment){
    alert("Please enter valid rating (1-5) and comment.");
    return;
  }

  reviews.push({
    freelancerEmail: currentFreelancerEmail,
    clientName: currentClient.name,
    rating: rating,
    comment: comment
  });

  localStorage.setItem("reviews", JSON.stringify(reviews));
  alert("Review submitted!");
  closeModal();
  render();
}
</script>

</body>
  </html>
