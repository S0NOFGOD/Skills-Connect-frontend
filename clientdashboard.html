<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  padding:20px;
}

.container{
  max-width:450px;
  margin:auto;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border:none;
  border-radius:10px;
  font-size:14px;
}

input,select{
  background:rgba(255,255,255,0.15);
  color:#fff;
}

select option{color:#000;}

button{
  font-weight:600;
  cursor:pointer;
}

.find-btn{background:linear-gradient(135deg,#ffb347,#ffcc33); color:#000;}
.delete{background:linear-gradient(135deg,#ff4b5c,#ff0000);}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

.card img{
  width:60px;
  height:60px;
  border-radius:50%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="container">

<h2 style="text-align:center;margin-bottom:15px;">Find Local Freelancers</h2>

<input type="text" id="location" placeholder="Enter location">

<button class="find-btn" onclick="getLocation()">Use My Location</button>

<select id="skill">
  <option value="">Select Skill</option>
  <option>Barber</option>
  <option>Phone Repairer</option>
  <option>Electrician</option>
  <option>Plumber</option>
  <option>Web Developer</option>
  <option>Cleaner</option>
</select>

<button onclick="filterFreelancers()">Search</button>

<button class="delete" onclick="deleteAccount()">Delete Account</button>

<div id="results"></div>

</div>

<script>
// Load freelancers
function filterFreelancers(){
  const location = document.getElementById("location").value.toLowerCase();
  const skill = document.getElementById("skill").value;
  const users = JSON.parse(localStorage.getItem("users")) || [];

  const results = users.filter(u =>
    (!skill || u.skill === skill) &&
    (!location || u.location.toLowerCase().includes(location))
  );

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(results.length === 0){
    container.innerHTML = "<p>No freelancers found</p>";
    return;
  }

  results.forEach(u => {
    container.innerHTML += `
      <div class="card">
        <img src="${u.image || 'https://via.placeholder.com/60'}">
        <h3>${u.name}</h3>
        <p>${u.skill}</p>
        <p>${u.location}</p>
        <p>${u.phone}</p>
      </div>
    `;
  });
}

// Location
function getLocation(){
  const input = document.getElementById("location");
  input.value = "Fetching...";

  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude, longitude} = pos.coords;

    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
    const data = await res.json();

    input.value = data.address.city || data.address.state || "Unknown";
  }, ()=>{
    input.value = "Permission denied";
  });
}

// Delete client
function deleteAccount(){
  const client = JSON.parse(localStorage.getItem("currentClient"));

  if(confirm("Delete account?")){
    let clients = JSON.parse(localStorage.getItem("clients")) || [];
    clients = clients.filter(c => c.email !== client.email);

    localStorage.setItem("clients", JSON.stringify(clients));
    localStorage.removeItem("currentClient");

    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
