<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  min-height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  padding:20px;
  color:#fff;
}
.dashboard-container{
  width:95%;
  max-width:500px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
h1{text-align:center;font-weight:700;margin-bottom:20px;}
label{display:block;margin-bottom:5px;font-weight:600;}
input,select,button{width:100%;padding:12px;margin-bottom:15px;border-radius:12px;border:none;outline:none;font-size:14px;}
input,select{background:rgba(255,255,255,0.15);color:#fff;}
select option{color:#000;}
button{background:linear-gradient(135deg,#ffa500,#ff6600);color:#fff;font-weight:600;cursor:pointer;transition:0.3s ease;}
button:hover{transform:scale(1.03);}
.freelancer-card{
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  animation:fadeIn 0.5s ease;
}
.freelancer-card img{
  width:60px;height:60px;border-radius:50%;object-fit:cover;margin-right:10px;
}
.card-header{display:flex;align-items:center;margin-bottom:10px;}
.card-info{font-size:14px;opacity:0.9;}
#aboutme-btn{background:linear-gradient(135deg,#00c6ff,#0072ff);margin-bottom:15px;}
</style>
</head>
<body>

<div class="dashboard-container">
  <h1>Client Dashboard</h1>
  <button id="aboutme-btn">About Me</button>

  <label for="skill-select">Select Skill</label>
  <select id="skill-select">
    <option value="">-- All Skills --</option>
    <option>Barber</option>
    <option>Phone Repairer</option>
    <option>Electrician</option>
    <option>Plumber</option>
    <option>Web Developer</option>
    <option>Cleaner</option>
  </select>

  <label for="location-input">Location</label>
  <input type="text" id="location-input" placeholder="Enter location (or use current)" />
  <button id="get-location-btn" style="background:linear-gradient(135deg,#00c6ff,#0072ff);color:#fff;">Use My Current Location</button>
  <button id="search-btn">Search Freelancers</button>

  <div id="results-container"></div>
</div>

<script>
// ----------------------------
// CURRENT CLIENT
// ----------------------------
let currentClient = JSON.parse(localStorage.getItem("currentClient"));
if(!currentClient){ alert("No client logged in!"); window.location.href="client.html"; }

// ----------------------------
// ABOUT ME BUTTON
// ----------------------------
document.getElementById("aboutme-btn").addEventListener("click", ()=>{
  window.location.href="aboutme.html";
});

// ----------------------------
// GET CURRENT LOCATION
// ----------------------------
document.getElementById('get-location-btn').addEventListener('click', ()=> {
  const locInput = document.getElementById('location-input');
  locInput.value='Fetching...';

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(async (position)=>{
      const {latitude,longitude}=position.coords;
      try{
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
        const data = await res.json();
        const city = data.address.city || data.address.town || data.address.village || '';
        const state = data.address.state || '';
        locInput.value = city && state ? `${city}, ${state}` : 'Location not found';
      }catch(e){ locInput.value='Unable to fetch location'; }
    }, ()=>{ locInput.value='Permission denied'; });
  } else { locInput.value='Geolocation not supported'; }
});

// ----------------------------
// SEARCH FREELANCERS
// ----------------------------
document.getElementById('search-btn').addEventListener('click', ()=>{
  const skill = document.getElementById('skill-select').value;
  const location = document.getElementById('location-input').value.toLowerCase();

  const users = JSON.parse(localStorage.getItem("users"))||[];
  let results = users.filter(u=>{
    const matchSkill = skill ? u.skill === skill : true;
    const matchLocation = location ? u.location.toLowerCase().includes(location) : true;
    return matchSkill && matchLocation;
  });

  const container = document.getElementById('results-container');
  container.innerHTML='';
  if(results.length===0){ container.innerHTML='<p>No freelancers found.</p>'; return; }

  results.forEach(f=>{
    const card = document.createElement('div');
    card.className='freelancer-card';
    card.innerHTML=`
      <div class="card-header">
        <img src="${f.image || 'https://via.placeholder.com/60'}" alt="Profile">
        <div>
          <strong>${f.name}</strong><br>
          <span class="card-info">${f.skill}</span>
        </div>
      </div>
      <div class="card-info"><strong>Email:</strong> ${f.email}</div>
      <div class="card-info"><strong>Phone:</strong> ${f.phone}</div>
      <div class="card-info"><strong>Location:</strong> ${f.location}</div>
    `;
    container.appendChild(card);
  });
});
</script>
</body>
</html>
