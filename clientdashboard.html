<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Montserrat',sans-serif; min-height:100vh; display:flex; justify-content:center; align-items:flex-start; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; padding-top:50px;}
.dashboard-container{width:95%;max-width:500px; background:rgba(255,255,255,0.08); backdrop-filter:blur(20px); border-radius:20px; padding:30px; box-shadow:0 25px 60px rgba(0,0,0,0.4);}
input,select,button{width:100%;padding:14px;margin-bottom:15px;border-radius:12px;border:none;}
button{cursor:pointer; font-weight:600; transition:0.3s;}
#about-btn{background:linear-gradient(135deg,#33ccff,#0066ff); color:#fff;}
#search-btn{background:linear-gradient(135deg,#00c6ff,#0072ff); color:#fff;}
.result{background:rgba(0,0,0,0.4); padding:10px; border-radius:12px; margin-top:10px;}
</style>
</head>
<body>
<div class="dashboard-container">
<h2>Welcome, Client!</h2>
<button id="about-btn" onclick="window.location.href='aboutMe.html'">About Me</button>
<select id="skill-select">
<option value="">Select Skill</option>
<option>Barber</option>
<option>Phone Repairer</option>
<option>Electrician</option>
<option>Plumber</option>
<option>Web Developer</option>
<option>Cleaner</option>
</select>
<input type="text" id="client-location" placeholder="Location" readonly />
<button id="get-location-btn">Use My Current Location</button>
<button id="search-btn">Search</button>

<div id="results"></div>
</div>

<script>
// Load freelancers
let users = JSON.parse(localStorage.getItem('users')) || [];
let currentUser = JSON.parse(localStorage.getItem('currentUser'));
if(!currentUser){ window.location.href='client.html'; }

// Location finder
document.getElementById('get-location-btn').addEventListener('click', ()=>{
const locInput = document.getElementById('client-location');
locInput.value = 'Loading...';
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async (pos)=>{
const { latitude, longitude } = pos.coords;
try {
const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
const data = await res.json();
const state = data.address.state || '';
const country = data.address.country || '';
locInput.value = state && country ? `${state}, ${country}` : 'Location not found';
} catch(e){ locInput.value='Unable to fetch location'; }
}, ()=>{ locInput.value='Permission denied'; });
} else { locInput.value='Geolocation not supported'; }
});

// Search freelancers
document.getElementById('search-btn').addEventListener('click', ()=>{
const skill = document.getElementById('skill-select').value;
const location = document.getElementById('client-location').value.trim();
const resultsDiv = document.getElementById('results');
resultsDiv.innerHTML = '';
if(!skill || !location){ alert('Select skill and location'); return; }

const matched = users.filter(u => u.skill === skill && u.location.includes(location));
if(matched.length === 0){ resultsDiv.innerHTML = '<p>No freelancers found</p>'; return; }

matched.forEach(f=>{
const div = document.createElement('div');
div.className='result';
div.innerHTML = `<strong>${f.name}</strong><br>Skill: ${f.skill}<br>Email: ${f.email}<br>Phone: ${f.phone}`;
resultsDiv.appendChild(div);
});
});
</script>
</body>
</html>
