<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillConnect — Client Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body {
  min-height:100vh;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  padding:20px 0;
  color:#fff;
}
.dashboard-container {
  width:95%;
  max-width:500px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
  animation:fadeIn 1s ease;
}
@keyframes fadeIn {from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

h2 {text-align:center;margin-bottom:20px;}
input,select,button{width:100%;padding:14px;margin-bottom:15px;border-radius:12px;border:none;outline:none;font-size:14px;}
input,select{background:rgba(255,255,255,0.15);color:#fff;}
select option{color:#000;}
button{background:linear-gradient(135deg,#ffa500,#ff6600);color:#fff;font-weight:600;cursor:pointer;transition:0.3s ease;}
button:hover{transform:scale(1.03);}
#use-location-btn{background:linear-gradient(135deg,#00c6ff,#0072ff);margin-bottom:15px;}
.freelancer-card{
  background: rgba(255,255,255,0.08);
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 15px 30px rgba(0,0,0,0.3);
  animation:fadeIn 0.8s ease;
}
.freelancer-card h3{margin-bottom:5px;}
.freelancer-card p{opacity:0.85;font-size:14px;margin-bottom:3px;}
.button-group {display:flex; justify-content:space-between; margin-top:10px;}
button.about-btn{background:linear-gradient(135deg,#ffa500,#ff6600);}
</style>
</head>
<body>

<div class="dashboard-container">
  <h2>Search Freelancers</h2>

  <select id="skill-select">
    <option value="">Select Skill</option>
    <option>Barber</option>
    <option>Phone Repairer</option>
    <option>Electrician</option>
    <option>Plumber</option>
    <option>Web Developer</option>
    <option>Cleaner</option>
  </select>

  <input type="text" id="location-input" placeholder="Enter Location (City, State)"/>
  <button id="use-location-btn">Use My Current Location</button>
  <button id="search-btn">Search</button>

  <div id="results"></div>

  <div class="button-group">
    <button class="about-btn" id="about-btn">About Me</button>
  </div>
</div>

<script>
// Fetch current client
const currentClient = JSON.parse(localStorage.getItem("currentClient"));
if(!currentClient){ alert("No client logged in"); window.location.href="client.html"; }

// ABOUT ME BUTTON
document.getElementById('about-btn').addEventListener('click', ()=>{ window.location.href="aboutme.html"; });

// GET CURRENT LOCATION
document.getElementById('use-location-btn').addEventListener('click', ()=> {
  const locInput = document.getElementById('location-input');
  locInput.value = 'Fetching...';
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(async (position)=>{
      const { latitude, longitude } = position.coords;
      try {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
        const data = await response.json();
        const city = data.address.city || data.address.town || data.address.village || '';
        const state = data.address.state || '';
        locInput.value = city && state ? `${city}, ${state}` : 'Location not found';
      } catch(e){
        locInput.value = 'Unable to fetch location';
      }
    }, ()=> { locInput.value='Permission denied'; });
  } else { locInput.value='Geolocation not supported'; }
});

// SEARCH FREELANCERS
document.getElementById('search-btn').addEventListener('click', ()=>{
  const skill = document.getElementById('skill-select').value;
  const location = document.getElementById('location-input').value.toLowerCase().trim();
  const results = document.getElementById('results');
  results.innerHTML='';

  let users = JSON.parse(localStorage.getItem("users")) || [];
  let filtered = users.filter(u=>{
    const skillMatch = skill ? u.skill === skill : true;
    const locMatch = location ? u.location.toLowerCase().includes(location) : true;
    return skillMatch && locMatch;
  });

  if(filtered.length===0){
    results.innerHTML="<p style='text-align:center;margin-top:20px;'>No freelancers found.</p>";
    return;
  }

  filtered.forEach(u=>{
    const card = document.createElement('div');
    card.className = 'freelancer-card';
    card.innerHTML=`
      <h3>${u.name}</h3>
      <p><strong>Skill:</strong> ${u.skill}</p>
      <p><strong>Email:</strong> ${u.email}</p>
      <p><strong>Phone:</strong> ${u.phone}</p>
      <p><strong>Location:</strong> ${u.location}</p>
    `;
    results.appendChild(card);
  });
});
</script>
</body>
</html>
