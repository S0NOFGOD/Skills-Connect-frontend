<!DOCTYPE html>    
<html lang="en">    
<head>    
<meta charset="UTF-8" />    
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>    
<title>SkillConnect — Connect with Skilled Professionals</title>    
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">    
    
<style>    
* {    
  margin:0;    
  padding:0;    
  box-sizing:border-box;    
  font-family:'Montserrat',sans-serif;    
}    

/* GLOBAL BACKGROUND */    
body {    
  min-height:100vh;    
  display:flex;    
  flex-direction:column;    
  align-items:center;    
  justify-content:center;    
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);    
  color:#fff;    
  padding:20px;    
}    

/* GLASS CARD (STANDARDIZED) */    
.landing-container {    
  width:100%;    
  max-width:420px;    
  background: rgba(255,255,255,0.08);    
  backdrop-filter: blur(25px);    
  border-radius:20px;    
  padding:50px 25px 40px 25px;    
  box-shadow:0 20px 50px rgba(0,0,0,0.4);    
  border:1px solid rgba(255,255,255,0.1);    
  text-align:center;    
  animation:fadeIn 0.8s ease;    
}    

@keyframes fadeIn {    
  from {opacity:0; transform:translateY(20px);}    
  to {opacity:1; transform:translateY(0);}    
}    

/***** ILLUSTRATION *****/
.landing-container img {
  width:100px;
  margin-bottom:20px;
  animation:fadeIn 1s ease;
}

/* HEADINGS */    
.landing-container h1 {    
  font-size:2rem;    
  margin-bottom:15px;    
  font-weight:700;    
}    

.landing-container p {    
  font-size:0.95rem;    
  opacity:0.85;    
  margin-bottom:35px;    
  line-height:1.5;    
}    

/* BUTTON GROUP */    
.button-group {    
  display:flex;    
  flex-direction:column;    
  gap:15px;    
}    

/* STANDARD BUTTON STYLE */    
.button-group a {    
  padding:14px 0;    
  border-radius:12px;    
  font-weight:600;    
  font-size:0.95rem;    
  text-decoration:none;    
  color:#fff;    
  transition:0.3s ease, box-shadow 0.3s ease;    
  cursor:pointer;    
  box-shadow:0 8px 20px rgba(0,0,0,0.3);    
}    

/* CONSISTENT COLORS */    
.freelancer-btn {    
  background:linear-gradient(135deg,#00c6ff,#0072ff);    
}    

.client-btn {    
  background:linear-gradient(135deg,#ffa500,#ff6600);    
}    

/* HOVER EFFECT */    
.button-group a:hover {    
  transform:translateY(-2px) scale(1.03);    
  box-shadow:0 12px 25px rgba(0,0,0,0.45);
}    

/* RESPONSIVE */    
@media(min-width:501px){    
  .button-group {    
    flex-direction:row;    
    justify-content:center;    
  }    
  .button-group a {    
    width:auto;    
    padding:14px 30px;    
  }    
}    
</style>    
</head>    
<body>    

<div class="landing-container">    
  <!-- Illustration / Icon -->
  <img src="https://img.icons8.com/ios-filled/100/ffffff/network.png" alt="SkillConnect Icon"/>

  <h1>Welcome to SkillConnect</h1>    
  <p>Find skilled freelancers near you or showcase your skills to get hired. Join our community and start connecting today!</p>    
    
  <div class="button-group">    
    <a href="freelancer.html" class="freelancer-btn">I'm a Freelancer</a>    
    <a href="client.html" class="client-btn">I'm a Client</a>    
  </div>    
</div>    
    
</body>    
</html>
